name: Test & Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # JOB 1: TEST BACKEND (Node.js)
  # ============================================
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm install
      
      - name: Run backend tests
        run: |
          cd backend
          npm run test:ci
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret
          NODE_ENV: test

  # ============================================
  # JOB 2: TEST ANDROID (Kotlin)
  # ============================================
  android-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Run Android tests
        run: |
          cd MyZubster
          chmod +x gradlew
          ./gradlew test --no-daemon

  # ============================================
  # JOB 3: TEST MONERO (Node.js)
  # ============================================
  monero-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm install
      
      - name: Run Monero tests
        run: |
          cd backend
          npm run test -- --testPathPattern=monero
        env:
          MONERO_WALLET_RPC_URL: http://127.0.0.1:38082/json_rpc
          MONERO_NODE_URL: http://127.0.0.1:18081/json_rpc
          NODE_ENV: test

  # ============================================
  # JOB 4: BUILD APK (Debug)
  # ============================================
  build-apk:
    runs-on: ubuntu-latest
    needs: [android-tests]
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build debug APK
        run: |
          cd MyZubster
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: MyZubster/app/build/outputs/apk/debug/app-debug.apk

  # ============================================
  # JOB 5: LINTING & CODE QUALITY
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm install
      
      - name: Run ESLint (se configurato)
        run: |
          cd backend
          npm run lint || true
        continue-on-error: true